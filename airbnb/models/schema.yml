models:
  - name: dim_listings_cleansed
    description: "This is the dimension table for AIRBNB listings. It contains the cleansed data for listings."
    data_tests:
      - minimum_row_count:
          arguments:            #arguments line might be missing sometimes in versions 1.10+
            min_row_count: 1000000
          config:
            severity: error
    columns:
      - name: listing_id
        description: "The unique identifier for each listing."
        data_tests:  #earlier versions of dbt used 'tests' instead of 'data_tests'
          - not_null
          - unique
      - name: host_id
        description: "The unique identifier for the host of each listing."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hosts_cleansed')
                field: host_id
      - name: room_type
        description: "The type of room available for booking."
        data_tests:
          - accepted_values:
              arguments:
                values: ['Entire home/apt', 'Private room', 'Shared room', 'Hotel room']
      - name: minimum_nights
        description: '{{dim_listing_cleansed__minimum_nights}}'
        data_tests:
          - positive_values
  - name: dim_hosts_cleansed # this section is to enable the schema on the model
    config:
      contract:
        enforced: true
    columns:
      - name: host_id
        data_type: integer
      - name: host_name
        data_type: string
      - name: is_superhost
        data_type: string
      - name: updated_at
        data_type: timestamp
      - name: created_at
        data_type: timestamp
  - name: dim_listings_w_hosts
    tests:
    - dbt_expectations.expect_table_row_count_to_equal_other_table:
          compare_model: source("airbnb","listings")
          # group_by: [col1, col2] # (Optional)
          # compare_group_by: [col1, col2] # (Optional)
          # factor: 1 # (Optional)
          # row_condition: "id is not null" # (Optional)
          # compare_row_condition: "id is not null" # (Optional)